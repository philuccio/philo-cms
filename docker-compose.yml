services:
  mysql:
    image: mysql:8.0
    container_name: philo_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: philo_root_2025
      MYSQL_DATABASE: philo_cms
      MYSQL_USER: philo
      MYSQL_PASSWORD: philo_dev_2025
    ports:
      - "3306:3306"
    volumes:
      - philo_mysql_data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

volumes:
  philo_mysql_data:
